ema:
  _target_: genmol.train.callbacks.ema.EMACallback
  decay: 0.999
rdkit_eval:
  _target_: genmol.train.callbacks.rdkit_eval.RDKitEvalCallback
  every_n_steps: 1000
  n_samples: 64
  n_atoms: 25
  num_sampling_steps: 100
posebusters_eval:
  _target_: genmol.train.callbacks.posebusters_eval.PoseBustersEvalCallback
  every_n_steps: 5000
  n_samples: 50
docking_eval:
  _target_: genmol.train.callbacks.docking_eval.DockingEvalCallback
  every_n_steps: 10000
  n_samples: 100
  receptor_pdb: ???
boltz_eval:
  _target_: genmol.train.callbacks.boltz_eval.BoltzEvalCallback
  every_n_epochs: 1
  n_top_k: 50
sample_logger:
  _target_: genmol.train.callbacks.sample_logger.SampleLoggerCallback
  every_n_steps: 5000
  n_samples: 8
model_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: ${output_dir}/checkpoints
  filename: "{epoch}-{step}"
  every_n_train_steps: 5000
  save_top_k: -1
