# Default callback set: EMA + RDKit eval + Lightning checkpointing.
ema:
  _target_: genmol.train.callbacks.ema.EMACallback
  decay: 0.999
rdkit_eval:
  _target_: genmol.train.callbacks.rdkit_eval.RDKitEvalCallback
  every_n_steps: 1000
  n_samples: 64
  n_atoms: 19
  num_sampling_steps: 100
model_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: ${output_dir}/checkpoints
  filename: "{epoch}-{step}"
  every_n_train_steps: 5000
  save_top_k: -1
