name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install (CPU-only — runners have no GPU)
        run: |
          python -m pip install --upgrade pip
          # CPU torch wheels (no CUDA) for the runner
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            "torch==2.4.1+cpu"
          pip install \
            "lightning>=2.4" torchmetrics \
            "rdkit>=2023.9.6" \
            "hydra-core>=1.3" omegaconf \
            "numpy<2" scipy pandas h5py tqdm rich \
            pytest pytest-timeout pytest-cov \
            ruff black

      - name: Install genmol package
        run: pip install -e . --no-deps

      - name: Lint (ruff)
        run: ruff check genmol/ tests/ scripts/ || true   # advisory for now

      - name: Run unit tests
        run: pytest tests/unit/ -v --timeout=60

      - name: Run smoke tests (no QM9 download)
        # Excludes test_train_qm9_edm_10steps.py which needs the dataset
        run: pytest tests/smoke/test_imports.py tests/smoke/test_sample_5_molecules.py -v --timeout=60
